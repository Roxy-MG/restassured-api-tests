# \u5E76\u53D1\u914D\u7F6E\u6587\u4EF6
# \u82E5\u6D4B\u8BD5\u7C7B\u65E0\u6CD5\u5E76\u53D1\uFF08\u7C7B\u91CC\u7684\u65B9\u6CD5\u5B58\u5728\u5171\u7528\u7684\u53EF\u53D8\u5BF9\u8C61\uFF09\uFF0C\u5728\u6D4B\u8BD5\u7C7B\u4E0A\u6DFB\u52A0 @Execution(ExecutionMode.SAME_THREAD)

# \u5F00\u542F\u5E76\u53D1\u6267\u884C\u6A21\u5F0F
junit.jupiter.execution.parallel.enabled=true
# \u9876\u5C42\u8282\u70B9\u7684\u5E76\u53D1\u6A21\u5F0F\uFF08\u4F5C\u7528\u4E8E\u6D4B\u8BD5\u7C7B\uFF09\uFF1ASAME_THREAD(\u6240\u6709\u6D4B\u8BD5\u7C7B\u5728\u540C\u4E00\u7EBF\u7A0B), CONCURRENT(\u4E0D\u540C\u6D4B\u8BD5\u7C7B\u5728\u4E0D\u540C\u7EBF\u7A0B)
junit.jupiter.execution.parallel.mode.default=concurrent
# \u5B50\u8282\u70B9\u7684\u5E76\u53D1\u6A21\u5F0F\uFF08\u4F5C\u7528\u4E8E\u6D4B\u8BD5\u65B9\u6CD5\uFF09\uFF1ASAME_THREAD(\u540C\u4E00\u7C7B\u7684\u4E0D\u540C\u65B9\u6CD5\u5728\u540C\u4E00\u7EBF\u7A0B), CONCURRENT(\u8FD0\u884C\u540C\u4E00\u7C7B\u7684\u65B9\u6CD5\u5728\u4E0D\u540C\u7EBF\u7A0B)
junit.jupiter.execution.parallel.mode.classes.default=concurrent
# \u7EBF\u7A0B\u6C60\u7B56\u7565\uFF1Afixed(\u56FA\u5B9A), dynamic(\u52A8\u6001), custom(\u81EA\u5B9A\u4E49)
junit.jupiter.execution.parallel.config.strategy=fixed
# \u56FA\u5B9A\u7EBF\u7A0B\u6570
